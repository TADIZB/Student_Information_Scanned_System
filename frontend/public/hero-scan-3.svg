<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cardBg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
    <linearGradient id="cardHeader3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b91c1c"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <pattern id="grid3" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
    <filter id="cardShadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#grid3)"/>

  <!-- Decorative -->
  <circle cx="680" cy="480" r="120" fill="rgba(255,255,255,0.05)"/>
  <circle cx="130" cy="120" r="95" fill="rgba(255,255,255,0.05)"/>
  <circle cx="120" cy="470" r="6" fill="rgba(255,255,255,0.24)"/>
  <circle cx="740" cy="120" r="5" fill="rgba(255,255,255,0.22)"/>

  <!-- Viewfinder corners -->
  <g stroke="rgba(255,255,255,0.55)" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M 180 120 L 180 90 L 220 90"/>
    <path d="M 680 120 L 680 90 L 640 90"/>
    <path d="M 180 480 L 180 510 L 220 510"/>
    <path d="M 680 480 L 680 510 L 640 510"/>
  </g>

  <!-- CCCD Card -->
  <g transform="translate(215, 175) rotate(-5)" filter="url(#cardShadow3)">
    <rect width="430" height="265" rx="20" fill="url(#cardBg3)"/>
    <path d="M 0 20 Q 0 0 20 0 L 410 0 Q 430 0 430 20 L 430 58 L 0 58 Z" fill="url(#cardHeader3)"/>
    <text x="215" y="36" font-family="'Space Grotesk', sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1.5">
      CĂN CƯỚC CÔNG DÂN
    </text>

    <!-- Face photo with detection box -->
    <rect x="24" y="80" width="120" height="150" rx="10" fill="#dfe5ee"/>
    <circle cx="84" cy="132" r="30" fill="#9aa5b5"/>
    <path d="M 44 215 Q 84 168 124 215 L 124 230 L 44 230 Z" fill="#9aa5b5"/>
    <!-- Face detection bounding box (red) -->
    <rect x="54" y="100" width="62" height="62" rx="4" fill="none" stroke="#dc2626" stroke-width="2.5"/>
    <g stroke="#fca5a5" stroke-width="2.5" stroke-linecap="round">
      <path d="M 54 110 L 54 100 L 64 100"/>
      <path d="M 116 110 L 116 100 L 106 100"/>
      <path d="M 54 152 L 54 162 L 64 162"/>
      <path d="M 116 152 L 116 162 L 106 162"/>
    </g>

    <!-- Info lines -->
    <rect x="166" y="86" width="210" height="12" rx="6" fill="#1f2937"/>
    <rect x="166" y="112" width="150" height="7" rx="3.5" fill="#9ca3af"/>
    <rect x="166" y="132" width="190" height="7" rx="3.5" fill="#9ca3af"/>
    <rect x="166" y="152" width="120" height="7" rx="3.5" fill="#9ca3af"/>
    <rect x="166" y="172" width="170" height="7" rx="3.5" fill="#9ca3af"/>
    <rect x="166" y="200" width="240" height="7" rx="3.5" fill="#c7accb" opacity="0.7"/>

    <!-- Biometric dots -->
    <g fill="#dc2626" opacity="0.65">
      <circle cx="180" cy="106" r="2.4"/>
      <circle cx="210" cy="118" r="2.4"/>
      <circle cx="250" cy="110" r="2.4"/>
    </g>
  </g>

  <!-- Scan line -->
  <line x1="175" y1="305" x2="680" y2="305" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-dasharray="8,5"/>
  <line x1="175" y1="305" x2="680" y2="305" stroke="rgba(255,80,80,0.55)" stroke-width="6" filter="url(#cardShadow3)" stroke-linecap="round"/>
</svg>
