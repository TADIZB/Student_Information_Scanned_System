<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cardBg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
    <linearGradient id="cardHeader4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="db4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <pattern id="grid4" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
    <filter id="cardShadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#grid4)"/>

  <!-- Decorative -->
  <circle cx="110" cy="130" r="100" fill="rgba(255,255,255,0.05)"/>
  <circle cx="700" cy="520" r="120" fill="rgba(255,255,255,0.05)"/>
  <circle cx="90" cy="500" r="6" fill="rgba(255,255,255,0.24)"/>
  <circle cx="720" cy="90" r="5" fill="rgba(255,255,255,0.22)"/>

  <!-- Student profile card -->
  <g transform="translate(150, 180) rotate(-5)" filter="url(#cardShadow4)">
    <rect width="320" height="240" rx="20" fill="url(#cardBg4)"/>
    <path d="M 0 20 Q 0 0 20 0 L 300 0 Q 320 0 320 20 L 320 56 L 0 56 Z" fill="url(#cardHeader4)"/>
    <text x="160" y="35" font-family="'Space Grotesk', sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1.5">
      HỒ SƠ SINH VIÊN
    </text>
    <rect x="22" y="78" width="92" height="116" rx="10" fill="#c7d2e0"/>
    <circle cx="68" cy="118" r="18" fill="#6b7280"/>
    <path d="M 34 170 Q 68 144 102 170 L 102 194 L 34 194 Z" fill="#6b7280"/>
    <rect x="132" y="84" width="160" height="11" rx="5.5" fill="#1f2937"/>
    <rect x="132" y="106" width="110" height="7" rx="3.5" fill="#9ca3af"/>
    <rect x="132" y="124" width="140" height="7" rx="3.5" fill="#9ca3af"/>
    <rect x="132" y="142" width="95" height="7" rx="3.5" fill="#9ca3af"/>
    <rect x="132" y="168" width="160" height="7" rx="3.5" fill="#fca5a5"/>
  </g>

  <!-- Connection line to DB -->
  <g stroke="rgba(255,255,255,0.55)" stroke-width="3" stroke-dasharray="7,6" fill="none">
    <path d="M 470 300 C 540 300, 560 320, 600 330"/>
  </g>

  <!-- Database cylinder -->
  <g transform="translate(610, 250)">
    <ellipse cx="60" cy="20" rx="60" ry="20" fill="url(#db4)"/>
    <path d="M 0 20 L 0 130 A 60 20 0 0 0 120 130 L 120 20" fill="url(#db4)"/>
    <ellipse cx="60" cy="20" rx="60" ry="20" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <ellipse cx="60" cy="58" rx="60" ry="20" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
    <ellipse cx="60" cy="96" rx="60" ry="20" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
  </g>

  <!-- Success check badge -->
  <g transform="translate(400, 410)">
    <circle cx="0" cy="0" r="48" fill="#16a34a" filter="url(#cardShadow4)"/>
    <circle cx="0" cy="0" r="48" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
    <path d="M -22 2 L -6 18 L 24 -16" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="400" y="492" font-family="'Space Grotesk', sans-serif" font-size="18" font-weight="700" fill="rgba(255,255,255,0.92)" text-anchor="middle" letter-spacing="1">ĐÃ KHỚP</text>
</svg>
