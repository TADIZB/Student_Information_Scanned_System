<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cardBg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
    <linearGradient id="cardHeader2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <pattern id="grid2" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
    <filter id="cardShadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#grid2)"/>

  <!-- Decorative soft shapes -->
  <circle cx="120" cy="500" r="100" fill="rgba(255,255,255,0.05)"/>
  <circle cx="690" cy="110" r="120" fill="rgba(255,255,255,0.05)"/>
  <circle cx="730" cy="500" r="6" fill="rgba(255,255,255,0.25)"/>
  <circle cx="700" cy="540" r="4" fill="rgba(255,255,255,0.20)"/>
  <circle cx="90" cy="90" r="5" fill="rgba(255,255,255,0.22)"/>

  <!-- ID Card (tilted) with OCR field highlights -->
  <g transform="translate(210, 165) rotate(-6)" filter="url(#cardShadow2)">
    <rect width="430" height="270" rx="22" fill="url(#cardBg2)"/>
    <path d="M 0 22 Q 0 0 22 0 L 408 0 Q 430 0 430 22 L 430 64 L 0 64 Z" fill="url(#cardHeader2)"/>
    <text x="215" y="40" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="2">
      OCR · NHẬN DẠNG VĂN BẢN
    </text>

    <!-- Photo -->
    <rect x="24" y="86" width="104" height="134" rx="10" fill="#c7d2e0"/>
    <circle cx="76" cy="132" r="20" fill="#6b7280"/>
    <path d="M 38 192 Q 76 162 114 192 L 114 220 L 38 220 Z" fill="#6b7280"/>

    <!-- Extracted text fields with detection boxes (red) -->
    <g>
      <rect x="150" y="86" width="200" height="26" rx="5" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4"/>
      <rect x="158" y="94" width="150" height="10" rx="5" fill="#1f2937"/>
    </g>
    <g>
      <rect x="150" y="122" width="160" height="22" rx="5" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4"/>
      <rect x="158" y="129" width="110" height="8" rx="4" fill="#9ca3af"/>
    </g>
    <g>
      <rect x="150" y="154" width="240" height="22" rx="5" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4"/>
      <rect x="158" y="161" width="200" height="8" rx="4" fill="#9ca3af"/>
    </g>
    <g>
      <rect x="150" y="186" width="190" height="22" rx="5" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4"/>
      <rect x="158" y="193" width="140" height="8" rx="4" fill="#9ca3af"/>
    </g>
  </g>

  <!-- Magnifier glass -->
  <g transform="translate(540, 380)">
    <circle cx="0" cy="0" r="58" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.7)" stroke-width="5"/>
    <circle cx="0" cy="0" r="44" fill="none" stroke="rgba(255,80,80,0.6)" stroke-width="2"/>
    <line x1="42" y1="42" x2="86" y2="86" stroke="rgba(255,255,255,0.85)" stroke-width="10" stroke-linecap="round"/>
    <text x="0" y="8" font-family="'IBM Plex Mono', monospace" font-size="22" font-weight="700" fill="#fca5a5" text-anchor="middle">A</text>
  </g>

  <!-- Scan line -->
  <line x1="190" y1="300" x2="660" y2="300" stroke="rgba(255,255,255,0.85)" stroke-width="2" stroke-dasharray="8,5"/>
  <line x1="190" y1="300" x2="660" y2="300" stroke="rgba(255,80,80,0.55)" stroke-width="6" filter="url(#cardShadow2)" stroke-linecap="round"/>
</svg>
