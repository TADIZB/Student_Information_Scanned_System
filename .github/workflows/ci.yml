name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Cài system dependencies (Tesseract + zbar cho pyzbar)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-vie libzbar0

      - name: Cài Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff

      - name: Ruff lint
        run: ruff check backend/

      - name: Pytest
        env:
          # Tests cần secret giả để không phải sinh ngẫu nhiên mỗi lần
          JWT_SECRET: "ci-jwt-secret"
          PASSWORD_PEPPER: "ci-pepper-32-bytes-xxxxxxxxxxxxxxx"
          DATABASE_URL: "sqlite:///./ci-test.db"
        run: pytest backend/tests/ -v

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Dùng npm install thay npm ci vì package-lock.json chưa được regenerate sau khi
      # thêm react-router-dom; sau khi dev local chạy 'npm install' và commit lockfile
      # mới thì có thể đổi lại npm ci.
      - name: Install dependencies
        run: npm install --no-audit --no-fund --prefer-offline

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build
